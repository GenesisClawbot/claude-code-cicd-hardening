name: Claude Agent Hardening

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# Restrict default token permissions - agent shouldn't have more than it needs
permissions:
  contents: read
  pull-requests: write  # needed for PR summary comment
  checks: write

env:
  # Path to your agent's output file (adjust to match your setup)
  AGENT_OUTPUT_FILE: agent-output.json
  # BreakMyAgent fail threshold (0.0-1.0, fraction of attacks that can succeed)
  BMA_FAIL_THRESHOLD: "0.3"

jobs:
  harden:
    name: Claude Agent Hardening Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15  # hard cutoff - don't let a runaway agent block CI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # Step 1: Validate CLAUDE.md exists and has deny list entries
      # ----------------------------------------------------------------
      - name: Validate CLAUDE.md
        id: validate_claude_md
        run: |
          echo "## Checking CLAUDE.md configuration..." >> $GITHUB_STEP_SUMMARY

          if [ ! -f "CLAUDE.md" ]; then
            echo "::error::CLAUDE.md not found. Required for agent hardening."
            echo "claude_md_status=missing" >> $GITHUB_OUTPUT
            echo "| CLAUDE.md | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Check for required sections
          MISSING_SECTIONS=""
          required_sections=("Tool Restrictions" "Instruction Sources" "Output Format")
          for section in "${required_sections[@]}"; do
            if ! grep -q "$section" CLAUDE.md; then
              MISSING_SECTIONS="$MISSING_SECTIONS $section,"
            fi
          done

          if [ -n "$MISSING_SECTIONS" ]; then
            echo "::error::CLAUDE.md missing required sections:$MISSING_SECTIONS"
            echo "claude_md_status=incomplete" >> $GITHUB_OUTPUT
            echo "| CLAUDE.md | ❌ Missing sections:$MISSING_SECTIONS |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Check for deny list entries - at least one must exist
          deny_patterns=("Do not" "Never read" "do not use" "not allowed" "Deny" "Forbidden" "Prohibited")
          found=0
          for pattern in "${deny_patterns[@]}"; do
            if grep -qi "$pattern" CLAUDE.md; then
              found=1
              break
            fi
          done

          if [ "$found" -eq 0 ]; then
            echo "::error::CLAUDE.md has no deny list entries. Add explicit restrictions (e.g. 'Do not make network requests')."
            echo "claude_md_status=no_deny_list" >> $GITHUB_OUTPUT
            echo "| CLAUDE.md | ❌ No deny list entries found |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "claude_md_status=ok" >> $GITHUB_OUTPUT
          echo "| CLAUDE.md | ✅ Valid |" >> $GITHUB_STEP_SUMMARY
          echo "CLAUDE.md validation passed."

      # ----------------------------------------------------------------
      # Step 2: Check allowed tools flag is set (warns, doesn't fail)
      # ----------------------------------------------------------------
      - name: Check agent invocation for tool restrictions
        id: check_tools
        run: |
          # Look for Claude Code invocations in workflow files and scripts
          # that don't use --allowedTools
          ISSUES=""

          # Search for claude invocations without --allowedTools in workflow files
          while IFS= read -r -d '' file; do
            if grep -q "claude" "$file" 2>/dev/null; then
              if ! grep -q "\-\-allowedTools\|\-\-allowed-tools\|allowedTools" "$file" 2>/dev/null; then
                ISSUES="$ISSUES\n  - $file"
              fi
            fi
          done < <(find .github/workflows -name "*.yml" -print0 2>/dev/null)

          # Also check common script locations
          while IFS= read -r -d '' file; do
            if grep -q "claude\|claude-code\|@anthropic/claude" "$file" 2>/dev/null; then
              if ! grep -q "allowedTools\|allowed_tools\|--allowedTools" "$file" 2>/dev/null; then
                ISSUES="$ISSUES\n  - $file"
              fi
            fi
          done < <(find scripts -name "*.sh" -o -name "*.py" -print0 2>/dev/null)

          if [ -n "$ISSUES" ]; then
            echo "::warning::Claude invocations found without --allowedTools flag:"
            echo -e "$ISSUES"
            echo "| Tool Restrictions | ⚠️ --allowedTools not set in some files |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Tool Restrictions | ✅ OK (or no Claude invocations found) |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "tool_check_done=true" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------
      # Step 3: Run your agent (replace this with your actual agent step)
      # ----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Claude agent
        id: run_agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Replace this block with your actual agent invocation.
          # The key requirements:
          #   - Agent must produce output at $AGENT_OUTPUT_FILE
          #   - Use --allowedTools to restrict what the agent can do
          #   - Pass CLAUDE.md as context or ensure agent reads it on startup
          #
          # Example Claude Code invocation:
          #   claude --allowedTools "Read,Write" \
          #          --output-format json \
          #          --max-turns 10 \
          #          "Review the changed files and output a JSON summary" \
          #          > $AGENT_OUTPUT_FILE
          #
          # For testing this workflow without a real agent, we create sample output:
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not set - creating sample output for validation testing"
            echo '{"status": "ok", "changes_reviewed": 0, "issues": [], "summary": "No API key - test run only"}' > $AGENT_OUTPUT_FILE
          fi

      # ----------------------------------------------------------------
      # Step 4: Validate agent output format and check for refusals
      # ----------------------------------------------------------------
      - name: Validate agent output
        id: validate_output
        run: |
          OUTPUT_FILE="${AGENT_OUTPUT_FILE}"
          SCHEMA_FILE=".github/agent-output-schema.json"

          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "::error::Agent output file not found: $OUTPUT_FILE"
            echo "| Output Validation | ❌ Output file missing |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Check the file isn't empty
          if [ ! -s "$OUTPUT_FILE" ]; then
            echo "::error::Agent output file is empty"
            echo "| Output Validation | ❌ Output file empty |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Basic JSON validity
          if ! python3 -m json.tool "$OUTPUT_FILE" > /dev/null 2>&1; then
            echo "::error::Agent output is not valid JSON"
            echo "First 500 chars of output:"
            head -c 500 "$OUTPUT_FILE"
            echo "| Output Validation | ❌ Invalid JSON |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # JSON schema validation if schema exists
          if [ -f "$SCHEMA_FILE" ]; then
            pip install jsonschema -q
            python3 - <<'PYEOF'
          import json, jsonschema, sys, os

          output_file = os.environ.get("OUTPUT_FILE", "agent-output.json")
          schema_file = ".github/agent-output-schema.json"

          with open(output_file) as f:
              data = json.load(f)
          with open(schema_file) as f:
              schema = json.load(f)

          try:
              jsonschema.validate(data, schema)
              print("Schema validation passed.")
          except jsonschema.ValidationError as e:
              print(f"::error::Schema validation failed: {e.message}", file=sys.stderr)
              sys.exit(1)
          PYEOF
          fi

          # Refusal detection
          REFUSAL_FOUND=false
          python3 - <<'PYEOF'
          import json, sys, os

          output_file = os.environ.get("AGENT_OUTPUT_FILE", "agent-output.json")

          with open(output_file) as f:
              try:
                  data = json.load(f)
                  output_str = json.dumps(data).lower()
              except Exception:
                  # Already caught by JSON validation step
                  sys.exit(0)

          refusal_patterns = [
              "i cannot",
              "i am unable",
              "i'm unable",
              "i am not able",
              "i'm not able",
              "i apologize, but",
              "i'm sorry, but",
              "as an ai",
              "as a language model",
              "this falls outside",
              "i can't assist",
              "i won't be able",
          ]

          found = []
          for pattern in refusal_patterns:
              if pattern in output_str:
                  found.append(pattern)

          if found:
              print(f"::warning::Agent output contains refusal pattern(s): {found}")
              print("The agent may have partially or fully refused the task.")
              print("Review output manually before merging.")
              # Don't fail the build automatically - this is a warning
              # Change to sys.exit(1) if you want refusals to block merges
          else:
              print("No refusal patterns detected in output.")
          PYEOF

          echo "| Output Validation | ✅ Valid JSON, no refusals detected |" >> $GITHUB_STEP_SUMMARY

      # ----------------------------------------------------------------
      # Step 5: BreakMyAgent fuzz test (optional - skips if no API key)
      # ----------------------------------------------------------------
      - name: BreakMyAgent fuzz test
        id: breakmyagent
        if: env.BREAKMYAGENT_API_KEY != ''
        env:
          BREAKMYAGENT_API_KEY: ${{ secrets.BREAKMYAGENT_API_KEY }}
        run: |
          echo "BreakMyAgent API key found - running fuzz tests..."

          pip install breakmyagent -q

          # Start your agent in test mode
          # Replace with your actual agent startup command
          # Example: python agent/server.py --test-mode --port 8080 &
          echo "::notice::Configure your agent startup command in this step"
          echo "| BreakMyAgent | ⚠️ Skipped - no agent test server configured |" >> $GITHUB_STEP_SUMMARY
          exit 0

          # When your agent test server is configured, use this:
          # AGENT_PID=$!
          # sleep 5  # wait for startup
          #
          # breakmyagent run \
          #   --target-url http://localhost:8080/agent \
          #   --attack-suite injection,jailbreak,boundary \
          #   --output-file bma-results.json \
          #   --fail-threshold ${{ env.BMA_FAIL_THRESHOLD }} \
          #   --timeout 120
          #
          # BMA_EXIT=$?
          # kill $AGENT_PID 2>/dev/null
          #
          # if [ "$BMA_EXIT" -ne 0 ]; then
          #   echo "| BreakMyAgent | ❌ Fuzz tests failed (threshold: $BMA_FAIL_THRESHOLD) |" >> $GITHUB_STEP_SUMMARY
          #   exit 1
          # fi
          # echo "| BreakMyAgent | ✅ Fuzz tests passed |" >> $GITHUB_STEP_SUMMARY

      - name: BreakMyAgent skipped (no API key)
        if: env.BREAKMYAGENT_API_KEY == ''
        run: |
          echo "| BreakMyAgent | ⏭️ Skipped (set BREAKMYAGENT_API_KEY secret to enable) |" >> $GITHUB_STEP_SUMMARY

      # ----------------------------------------------------------------
      # Step 6: Post summary comment on PR
      # ----------------------------------------------------------------
      - name: Build PR summary
        if: github.event_name == 'pull_request'
        id: build_summary
        run: |
          SUMMARY="## Claude Agent Hardening Results\n\n"
          SUMMARY="${SUMMARY}| Check | Status |\n"
          SUMMARY="${SUMMARY}|-------|--------|\n"

          # Read the step summary we've been building
          if [ -f "$GITHUB_STEP_SUMMARY" ]; then
            TABLE=$(grep "^|" "$GITHUB_STEP_SUMMARY" | head -20)
            SUMMARY="${SUMMARY}${TABLE}"
          fi

          SUMMARY="${SUMMARY}\n\n**Run:** ${{ github.run_id }} | **Commit:** ${{ github.sha }}"

          echo "pr_comment<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Claude Agent Hardening Results

            | Check | Status |
            |-------|--------|
            | CLAUDE.md | ${{ steps.validate_claude_md.outputs.claude_md_status == 'ok' && '✅ Valid' || '❌ Failed' }} |
            | Tool restrictions check | ✅ Done (see logs for warnings) |
            | Output validation | ✅ Passed |
            | BreakMyAgent | ${{ env.BREAKMYAGENT_API_KEY != '' && '✅ Ran' || '⏭️ Skipped (no key)' }} |

            Full details in the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            > Powered by [claude-code-cicd-hardening](https://github.com/GenesisClawbot/claude-code-cicd-hardening)
